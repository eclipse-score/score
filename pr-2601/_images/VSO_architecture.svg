<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="1100" viewBox="0 0 1050 1100" font-family="Arial, Helvetica, sans-serif" font-size="12">
  <!-- Background -->
  <rect width="1050" height="1100" fill="white"/>

  <!-- Title -->
  <text x="525" y="25" text-anchor="middle" font-size="13" fill="#333">LGE Internal Use Only</text>

  <!-- ==================== TOP SECTION: ADAS & System Services ==================== -->

  <!-- ADAS Container - FEO -->
  <rect x="270" y="50" width="180" height="170" rx="3" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="360" y="70" text-anchor="middle" font-weight="bold" font-size="12">ADAS Container</text>
  <rect x="290" y="80" width="140" height="130" rx="2" fill="white" stroke="#999" stroke-width="1"/>
  <text x="360" y="98" text-anchor="middle" font-size="11">FEO</text>
  <!-- Circles A-E -->
  <circle cx="315" cy="125" r="14" fill="#1a6b7a"/>
  <text x="315" y="129" text-anchor="middle" fill="white" font-size="9" font-weight="bold">A</text>
  <circle cx="360" cy="140" r="14" fill="#1a6b7a"/>
  <text x="360" y="144" text-anchor="middle" fill="white" font-size="9" font-weight="bold">C</text>
  <circle cx="315" cy="175" r="14" fill="#1a6b7a"/>
  <text x="315" y="179" text-anchor="middle" fill="white" font-size="9" font-weight="bold">B</text>
  <circle cx="400" cy="120" r="14" fill="#1a6b7a"/>
  <text x="400" y="124" text-anchor="middle" fill="white" font-size="9" font-weight="bold">D</text>
  <circle cx="400" cy="170" r="14" fill="#1a6b7a"/>
  <text x="400" y="174" text-anchor="middle" fill="white" font-size="9" font-weight="bold">E</text>
  <!-- Lines between circles -->
  <line x1="329" y1="125" x2="346" y2="140" stroke="#555" stroke-width="1"/>
  <line x1="329" y1="175" x2="346" y2="140" stroke="#555" stroke-width="1"/>
  <line x1="374" y1="140" x2="386" y2="120" stroke="#555" stroke-width="1"/>
  <line x1="374" y1="140" x2="386" y2="170" stroke="#555" stroke-width="1"/>
  <line x1="315" y1="139" x2="315" y2="161" stroke="#555" stroke-width="1"/>
  <line x1="400" y1="134" x2="400" y2="156" stroke="#555" stroke-width="1"/>

  <!-- System Services Container -->
  <rect x="470" y="50" width="170" height="170" rx="3" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="555" y="70" text-anchor="middle" font-weight="bold" font-size="11">System Services</text>
  <text x="555" y="83" text-anchor="middle" font-weight="bold" font-size="11">Container</text>
  <rect x="490" y="93" width="130" height="115" rx="2" fill="white" stroke="#999" stroke-width="1"/>
  <text x="555" y="111" text-anchor="middle" font-size="11">Lifecycle&amp;Health</text>
  <circle cx="525" cy="150" r="16" fill="#1a6b7a"/>
  <text x="525" y="154" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Svc</text>
  <text x="525" y="163" text-anchor="middle" fill="white" font-size="7">#1</text>
  <circle cx="580" cy="150" r="16" fill="#1a6b7a"/>
  <text x="580" y="154" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Svc</text>
  <text x="580" y="163" text-anchor="middle" fill="white" font-size="7">#2</text>

  <!-- Digital Cockpit Container -->
  <rect x="660" y="50" width="190" height="170" rx="3" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="755" y="66" text-anchor="middle" font-weight="bold" font-size="10">Digital Cockpit</text>
  <text x="755" y="78" text-anchor="middle" font-weight="bold" font-size="10">Container</text>
  <rect x="680" y="80" width="150" height="130" rx="2" fill="white" stroke="#999" stroke-width="1"/>
  <text x="755" y="98" text-anchor="middle" font-size="11">Orchestration</text>
  <circle cx="710" cy="130" r="14" fill="#1a6b7a"/>
  <text x="710" y="134" text-anchor="middle" fill="white" font-size="8" font-weight="bold">DMS</text>
  <circle cx="760" cy="130" r="14" fill="#1a6b7a"/>
  <text x="760" y="134" text-anchor="middle" fill="white" font-size="8" font-weight="bold">IVI</text>
  <circle cx="710" cy="170" r="14" fill="#1a6b7a"/>
  <text x="710" y="174" text-anchor="middle" fill="white" font-size="8" font-weight="bold">BMS</text>
  <circle cx="760" cy="170" r="14" fill="#1a6b7a"/>
  <text x="760" y="174" text-anchor="middle" fill="white" font-size="8" font-weight="bold">...</text>

  <!-- ==================== Scenario.yml (Left) ==================== -->
  <!-- User icon -->
  <circle cx="155" cy="275" r="10" fill="none" stroke="#333" stroke-width="1.5"/>
  <path d="M145,300 Q155,290 165,300" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="155" y="255" text-anchor="middle" font-size="9" fill="#555">User</text>
  <!-- Arrow: User -> Scenario.yml -->
  <line x1="143" y1="285" x2="112" y2="285" stroke="#333" stroke-width="1"/>
  <polygon points="112,285 120,281 120,289" fill="#333"/>

  <!-- File icon -->
  <rect x="30" y="270" width="80" height="30" rx="2" fill="white" stroke="#333" stroke-width="1"/>
  <text x="70" y="290" text-anchor="middle" font-size="11">Scenario.yml</text>

  <!-- ==================== VSO BOX ==================== -->
  <rect x="220" y="260" width="640" height="200" rx="3" fill="white" stroke="#333" stroke-width="2"/>
  <text x="540" y="280" text-anchor="middle" font-weight="bold" font-size="14">Vehicle Service Orchestrator (VSO)</text>

  <!-- deploy arrow from Scenario.yml to API Server (drawn AFTER VSO box so visible on top) -->
  <text x="55" y="330" text-anchor="middle" font-size="10" fill="#555">deploy</text>
  <line x1="70" y1="300" x2="70" y2="320" stroke="#333" stroke-width="1.2"/>
  <line x1="70" y1="320" x2="260" y2="320" stroke="#333" stroke-width="1.2"/>
  <polygon points="260,320 252,316 252,324" fill="#333"/>

  <!-- Horizontal separator lines in VSO -->
  <line x1="220" y1="290" x2="860" y2="290" stroke="#333" stroke-width="1"/>

  <!-- Row 1: API Server | FilterGateway -->
  <rect x="260" y="300" width="200" height="40" rx="2" fill="white" stroke="#333" stroke-width="1.2"/>
  <text x="360" y="325" text-anchor="middle" font-size="12">API Server</text>

  <rect x="560" y="300" width="200" height="40" rx="2" fill="white" stroke="#333" stroke-width="1.2"/>
  <text x="660" y="325" text-anchor="middle" font-size="12">FilterGateway</text>

  <!-- Arrow: API Server -> FilterGateway -->
  <line x1="460" y1="320" x2="558" y2="320" stroke="#333" stroke-width="1.2"/>
  <polygon points="558,320 550,316 550,324" fill="#333"/>

  <!-- Row 2: ActionController | StateManager -->
  <rect x="260" y="355" width="200" height="40" rx="2" fill="white" stroke="#333" stroke-width="1.2"/>
  <text x="360" y="380" text-anchor="middle" font-size="12">ActionController</text>

  <rect x="560" y="355" width="200" height="40" rx="2" fill="white" stroke="#333" stroke-width="1.2"/>
  <text x="660" y="380" text-anchor="middle" font-size="12">StateManager</text>

  <!-- Arrow: FilterGateway -> ActionController -->
  <line x1="620" y1="340" x2="620" y2="348" stroke="#333" stroke-width="1.2"/>
  <line x1="620" y1="348" x2="400" y2="348" stroke="#333" stroke-width="1.2"/>
  <line x1="400" y1="348" x2="400" y2="355" stroke="#333" stroke-width="1.2"/>
  <polygon points="400,355 396,347 404,347" fill="#333"/>

  <!-- Row 3: NodeAgent | Monitoring -->
  <rect x="260" y="410" width="200" height="40" rx="2" fill="white" stroke="#333" stroke-width="1.2"/>
  <text x="360" y="435" text-anchor="middle" font-size="12">NodeAgent</text>

  <rect x="560" y="410" width="200" height="40" rx="2" fill="white" stroke="#333" stroke-width="1.2"/>
  <text x="660" y="435" text-anchor="middle" font-size="12">Monitoring</text>

  <!-- Arrow: NodeAgent -> Monitoring -->
  <line x1="460" y1="430" x2="558" y2="430" stroke="#333" stroke-width="1.2"/>
  <polygon points="558,430 550,426 550,434" fill="#333"/>

  <!-- Control arrows from NodeAgent, routed outside VSO left side (drawn AFTER VSO so visible on top) -->
  <!-- Trunk: NodeAgent left side -> outside VSO -> up -->
  <line x1="260" y1="430" x2="195" y2="430" stroke="#333" stroke-width="1.2"/>
  <line x1="195" y1="430" x2="195" y2="245" stroke="#333" stroke-width="1.2"/>

  <!-- Horizontal branch line under containers -->
  <line x1="195" y1="245" x2="755" y2="245" stroke="#333" stroke-width="1"/>

  <!-- Up to ADAS Container FEO -->
  <line x1="360" y1="245" x2="360" y2="220" stroke="#333" stroke-width="1.2"/>
  <polygon points="360,220 354,232 366,232" fill="#333"/>
  <text x="420" y="252" text-anchor="middle" font-size="10" fill="#555">control</text>

  <!-- Up to System Services Container -->
  <line x1="555" y1="245" x2="555" y2="220" stroke="#333" stroke-width="1.2"/>
  <polygon points="555,220 549,232 561,232" fill="#333"/>
  <text x="615" y="252" text-anchor="middle" font-size="10" fill="#555">control</text>

  <!-- Up to ADAS Container Orchestration -->
  <line x1="755" y1="245" x2="755" y2="220" stroke="#333" stroke-width="1.2"/>
  <polygon points="755,220 749,232 761,232" fill="#333"/>
  <text x="815" y="252" text-anchor="middle" font-size="10" fill="#555">control</text>

  <!-- ==================== DB (Right) ==================== -->
  <!-- DB cylinder (larger) -->
  <ellipse cx="940" cy="355" rx="45" ry="15" fill="white" stroke="#333" stroke-width="1.5"/>
  <rect x="895" y="355" width="90" height="45" fill="white" stroke="white" stroke-width="0"/>
  <line x1="895" y1="355" x2="895" y2="400" stroke="#333" stroke-width="1.5"/>
  <line x1="985" y1="355" x2="985" y2="400" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="940" cy="400" rx="45" ry="15" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="940" y="385" text-anchor="middle" font-weight="bold" font-size="15">DB</text>

  <!-- VSO <-> DB double arrow -->
  <line x1="860" y1="380" x2="893" y2="380" stroke="#333" stroke-width="1.2"/>
  <polygon points="893,380 885,376 885,384" fill="#333"/>
  <line x1="893" y1="370" x2="860" y2="370" stroke="#333" stroke-width="1.2"/>
  <polygon points="860,370 868,366 868,374" fill="#333"/>

  <!-- ==================== USE ARROWS (VSO -> Interfaces) ==================== -->

