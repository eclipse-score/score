  <text x="300" y="510" text-anchor="middle" font-size="10" fill="#555">use</text>
  <line x1="310" y1="450" x2="310" y2="500" stroke="#333" stroke-width="1"/>
  <line x1="310" y1="500" x2="190" y2="500" stroke="#333" stroke-width="1"/>
  <line x1="190" y1="500" x2="190" y2="560" stroke="#333" stroke-width="1"/>
  <polygon points="190,560 186,552 194,552" fill="#333"/>

  <!-- NodeAgent -> Logging Interface (use) — short right -->
  <text x="410" y="520" text-anchor="middle" font-size="10" fill="#555">use</text>
  <line x1="390" y1="450" x2="390" y2="515" stroke="#333" stroke-width="1"/>
  <line x1="390" y1="515" x2="410" y2="515" stroke="#333" stroke-width="1"/>
  <line x1="410" y1="515" x2="410" y2="560" stroke="#333" stroke-width="1"/>
  <polygon points="410,560 406,552 414,552" fill="#333"/>

  <!-- FilterGateway -> Communication Gateway (use) — nearly straight down -->
  <text x="620" y="510" text-anchor="middle" font-size="10" fill="#555">use</text>
  <line x1="630" y1="340" x2="630" y2="500" stroke="#333" stroke-width="1"/>
  <line x1="630" y1="500" x2="620" y2="500" stroke="#333" stroke-width="1"/>
  <line x1="620" y1="500" x2="620" y2="560" stroke="#333" stroke-width="1"/>
  <polygon points="620,560 616,552 624,552" fill="#333"/>

  <!-- Monitoring -> Tracing Interface (use) — short right -->
  <text x="820" y="520" text-anchor="middle" font-size="10" fill="#555">use</text>
  <line x1="710" y1="450" x2="710" y2="515" stroke="#333" stroke-width="1"/>
  <line x1="710" y1="515" x2="820" y2="515" stroke="#333" stroke-width="1"/>
  <line x1="820" y1="515" x2="820" y2="560" stroke="#333" stroke-width="1"/>
  <polygon points="820,560 816,552 824,552" fill="#333"/>

  <!-- ==================== INTERFACE BOXES (reordered to minimize crossings) ==================== -->

  <!-- OCI Interface Box (position 1 — left, under NodeAgent) -->
  <rect x="100" y="560" width="180" height="55" rx="3" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="190" y="585" text-anchor="middle" font-size="12" font-weight="bold">OCI</text>
  <text x="190" y="602" text-anchor="middle" font-size="12" font-weight="bold">Interface</text>

  <!-- Logging Interface Box (position 2) -->
  <rect x="330" y="560" width="160" height="55" rx="3" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="410" y="585" text-anchor="middle" font-size="12" font-weight="bold">Logging</text>
  <text x="410" y="602" text-anchor="middle" font-size="12" font-weight="bold">Interface</text>

  <!-- Communication Gateway Box (position 3 — under FilterGateway) -->
  <rect x="530" y="560" width="180" height="55" rx="3" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="620" y="585" text-anchor="middle" font-size="11" font-weight="bold">Communication</text>
  <text x="620" y="602" text-anchor="middle" font-size="11" font-weight="bold">Gateway</text>

  <!-- Tracing Interface Box (position 4 — under Monitoring) -->
  <rect x="740" y="560" width="160" height="55" rx="3" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="820" y="585" text-anchor="middle" font-size="12" font-weight="bold">Tracing</text>
  <text x="820" y="602" text-anchor="middle" font-size="12" font-weight="bold">Interface</text>

  <!-- ==================== IMPLEMENT ARROWS (from impl UP to interface) ==================== -->

  <!-- Podman -> OCI Interface (implement) -->
  <text x="190" y="670" text-anchor="middle" font-size="10" fill="#555">implement</text>
  <line x1="190" y1="700" x2="190" y2="615" stroke="#333" stroke-width="1"/>
  <polygon points="190,615 186,623 194,623" fill="#333"/>

  <!-- Logging -> Logging Interface (implement) -->
  <text x="410" y="670" text-anchor="middle" font-size="10" fill="#555">implement</text>
  <line x1="410" y1="700" x2="410" y2="615" stroke="#333" stroke-width="1"/>
  <polygon points="410,615 406,623 414,623" fill="#333"/>

  <!-- DDS/IPC/SOMEIP -> Communication Gateway (implement) -->
  <text x="620" y="670" text-anchor="middle" font-size="10" fill="#555">implement</text>
  <line x1="620" y1="700" x2="620" y2="615" stroke="#333" stroke-width="1"/>
  <polygon points="620,615 616,623 624,623" fill="#333"/>

  <!-- Tracing -> Tracing Interface (implement) -->
  <text x="820" y="670" text-anchor="middle" font-size="10" fill="#555">implement</text>
  <line x1="820" y1="700" x2="820" y2="615" stroke="#333" stroke-width="1"/>
  <polygon points="820,615 816,623 824,623" fill="#333"/>

  <!-- ==================== IMPLEMENTATION BOXES (reordered to match) ==================== -->

  <!-- Podman Impl (under OCI) -->
  <rect x="110" y="700" width="160" height="55" rx="3" fill="white" stroke="#333" stroke-width="1.2"/>
  <text x="130" y="715" font-size="11" fill="#1a6b7a" font-style="italic">Container engine</text>
  <rect x="130" y="723" width="80" height="25" rx="2" fill="white" stroke="#999" stroke-width="1"/>
  <text x="170" y="740" text-anchor="middle" font-size="11">Podman</text>

  <!-- Logging Impl (under Logging Interface) -->
  <rect x="340" y="700" width="140" height="55" rx="3" fill="white" stroke="#333" stroke-width="1.2"/>
  <text x="355" y="715" font-size="11" fill="#1a6b7a" font-style="italic">Logging</text>
  <text x="410" y="740" text-anchor="middle" font-size="12">Logging</text>

  <!-- DDS/IPC/SOMEIP (under Communication Gateway) -->
  <rect x="540" y="700" width="160" height="55" rx="3" fill="white" stroke="#333" stroke-width="1.2"/>
  <text x="560" y="715" font-size="11" fill="#1a6b7a" font-style="italic">Communication</text>
  <text x="620" y="735" text-anchor="middle" font-size="12">DDS/IPC/</text>
  <text x="620" y="750" text-anchor="middle" font-size="12">SOMEIP</text>

  <!-- Tracing Impl (under Tracing Interface) -->
  <rect x="755" y="700" width="130" height="55" rx="3" fill="white" stroke="#333" stroke-width="1.2"/>
  <text x="770" y="715" font-size="11" fill="#1a6b7a" font-style="italic">Tracing</text>
  <text x="820" y="740" text-anchor="middle" font-size="12">Tracing</text>
</svg>
