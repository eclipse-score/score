name: Publish Documentation

on:
  workflow_run:
    workflows: ["PR"]
    types:
      - completed

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  docs-deploy:
    uses: eclipse-score/cicd-workflows/.github/workflows/docs-publish.yml@dev
    permissions:
      pages: write
      id-token: write
      contents: write
      pull-requests: write
